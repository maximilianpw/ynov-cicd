name: AWS Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push and deploy. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: eu-west-3
  IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}
  MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

jobs:
  deploy:
    name: Build, provision, configure, and validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Trust private registry certificate on runner
        run: |
          set -o pipefail
          registry_host="${REGISTRY_HOST#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%/}"
          echo "REGISTRY_HOST=${registry_host}" >> "${GITHUB_ENV}"

          echo | openssl s_client -showcerts -connect "${registry_host}:443" -servername "${registry_host}" 2>/dev/null \
            | sed -n '/BEGIN CERTIFICATE/,/END CERTIFICATE/p' \
            | sudo tee /usr/local/share/ca-certificates/private-registry.crt >/dev/null

          sudo update-ca-certificates
          sudo mkdir -p "/etc/docker/certs.d/${registry_host}" "/etc/docker/certs.d/${registry_host}:443"
          sudo cp /usr/local/share/ca-certificates/private-registry.crt "/etc/docker/certs.d/${registry_host}/ca.crt"
          sudo cp /usr/local/share/ca-certificates/private-registry.crt "/etc/docker/certs.d/${registry_host}:443/ca.crt"
          sudo systemctl restart docker
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

      - name: Log in to private registry
        run: printf '%s' "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" --username "${REGISTRY_USERNAME}" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build \
            --file server/Dockerfile \
            --tag "${REGISTRY_HOST}/ynov-cicd-backend:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_HOST}/ynov-cicd-backend:${IMAGE_TAG}"

      - name: Build and push frontend image
        run: |
          docker build \
            --file Dockerfile \
            --build-arg VITE_API_URL=/api \
            --tag "${REGISTRY_HOST}/ynov-cicd-frontend:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_HOST}/ynov-cicd-frontend:${IMAGE_TAG}"

      - name: Terraform init
        run: terraform -chdir=infrastructure/application/terraform init

      - name: Terraform apply application infrastructure
        run: |
          terraform -chdir=infrastructure/application/terraform apply -auto-approve \
            -var "aws_region=${AWS_REGION}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Bridge Terraform outputs to Ansible
        run: |
          app_ip="$(terraform -chdir=infrastructure/application/terraform output -raw public_ip)"
          ssh_user="$(terraform -chdir=infrastructure/application/terraform output -raw ssh_user)"
          terraform -chdir=infrastructure/application/terraform output -raw private_key_pem > key.pem
          chmod 600 key.pem

          {
            echo "APP_IP=${app_ip}"
            echo "APP_SSH_USER=${ssh_user}"
            echo "APP_FRONTEND_URL=http://${app_ip}/ynov-cicd/"
            echo "APP_BACKEND_HEALTH_URL=http://${app_ip}:8000/health"
          } >> "${GITHUB_ENV}"

          {
            echo "[app]"
            echo "app_server ansible_host=${app_ip} ansible_user=${ssh_user} ansible_ssh_private_key_file=${PWD}/key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'"
          } > inventory.ini

      - name: Wait for SSH
        run: |
          for attempt in $(seq 1 30); do
            if ssh -i key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${APP_SSH_USER}@${APP_IP}" true; then
              exit 0
            fi
            sleep 10
          done

          echo "Timed out waiting for SSH on ${APP_IP}" >&2
          exit 1

      - name: Configure and deploy application
        run: ansible-playbook -i inventory.ini infrastructure/application/ansible/deploy.yml
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

      - name: Validate frontend and backend
        run: |
          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused "${APP_FRONTEND_URL}" >/dev/null
          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused "${APP_BACKEND_HEALTH_URL}"
          curl -fsS --retry 12 --retry-delay 5 --retry-connrefused "http://${APP_IP}/api/health"

          echo "Application frontend: ${APP_FRONTEND_URL}"
          echo "Application backend: ${APP_BACKEND_HEALTH_URL}"
