name: Build and Test React Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: |
          bun run build
          bun run test
        env:
          CI: true
