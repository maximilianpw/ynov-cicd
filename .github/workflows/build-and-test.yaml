name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        env:
          CI: true

      - name: Frontend unit and integration tests with coverage
        run: pnpm run coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend integration tests
        run: python -m pytest server

  docker-infra:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker infrastructure tests
        run: sh scripts/test-infrastructure.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d --build

      - name: Wait for Docker services
        run: sh scripts/wait-for-compose.sh

      - name: Cypress end-to-end tests
        run: pnpm run cy:run

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

  deploy-frontend:
    if: github.event_name == 'push'
    needs:
      - frontend-tests
      - backend-tests
      - docker-infra
      - e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: github-pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend production API URL
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "::error::Set the VITE_API_URL repository secret to the deployed Vercel API URL."
            exit 1
          fi
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build frontend for GitHub Pages
        run: pnpm run build
        env:
          CI: true
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/client

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-backend:
    if: github.event_name == 'push'
    needs:
      - frontend-tests
      - backend-tests
      - docker-infra
      - e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Vercel secrets
        run: |
          missing=false

          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "$(eval "printf '%s' \"\${${secret_name}}\"")" ]; then
              echo "::error::Set the ${secret_name} repository secret for backend deployment."
              missing=true
            fi
          done

          if [ "${missing}" = "true" ]; then
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pull Vercel project settings
        run: npx --yes vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy backend to Vercel
        run: npx --yes vercel@latest deploy --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
