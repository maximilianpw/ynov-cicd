name: Build and Test React Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: |
          bun run build
          bun run test
        env:
          CI: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    needs: build_test
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
