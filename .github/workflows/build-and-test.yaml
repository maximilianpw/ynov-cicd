name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        env:
          CI: true

      - name: Frontend unit and integration tests with coverage
        run: pnpm run coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend integration tests
        run: python -m pytest server

  docker-infra:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker infrastructure tests
        run: sh scripts/test-infrastructure.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Start Docker Compose
        run: |
          docker compose down -v
          docker compose up -d --build
        env:
          MYSQL_ROOT_PASSWORD: local-dev-root-password
          ADMIN_EMAIL: admin@example.test
          ADMIN_PASSWORD: local-dev-admin-password

      - name: Wait for Docker services
        run: sh scripts/wait-for-compose.sh
        env:
          MYSQL_ROOT_PASSWORD: local-dev-root-password
          ADMIN_EMAIL: admin@example.test
          ADMIN_PASSWORD: local-dev-admin-password

      - name: Cypress end-to-end tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm run cy:run

      - name: Cypress offline test with mocked API
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm run cy:offline

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
        env:
          MYSQL_ROOT_PASSWORD: local-dev-root-password
          ADMIN_EMAIL: admin@example.test
          ADMIN_PASSWORD: local-dev-admin-password
