name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: NPM semantic version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  build_test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: true

      - name: Test with coverage
        run: pnpm run coverage
        env:
          CI: true

      - name: Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install-command: pnpm install --frozen-lockfile
          start: pnpm run dev
          wait-on: http://localhost:3000/ynov-cicd/
          wait-on-timeout: 120
          command: pnpm run cy:run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Generate JSDoc docs
        run: pnpm run docs
        env:
          CI: true

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/client

  test-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: List containers
        run: docker ps

      - name: Wait for healthy services
        shell: bash
        run: |
          services=(db adminer server react)
          timeout_seconds=180
          started_at="$(date +%s)"

          for service in "${services[@]}"; do
            container_id="$(docker compose ps -q "$service")"

            if [ -z "$container_id" ]; then
              echo "::error::Container for service $service was not created"
              docker compose ps
              exit 1
            fi

            echo "Waiting for $service to become healthy..."

            while true; do
              is_healthy="$(docker inspect --format '{{json .State.Health.Status}}' "$container_id" | jq -r '. == "healthy"')"

              if [ "$is_healthy" = "true" ]; then
                echo "$service is healthy"
                break
              fi

              now="$(date +%s)"
              elapsed="$((now - started_at))"

              if [ "$elapsed" -ge "$timeout_seconds" ]; then
                status="$(docker inspect --format '{{json .State.Health.Status}}' "$container_id" | jq -r '.')"
                echo "::error::Timed out waiting for $service to become healthy. Last status: $status"
                docker compose ps
                docker logs "$container_id"
                exit 1
              fi

              sleep 5
            done
          done

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

  build-docker:
    if: github.event_name != 'pull_request'
    needs:
      - build_test
      - test-docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: maxpw777
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t maxpw777/frontend -f Dockerfile .
          docker push maxpw777/frontend

      - name: Build and push backend image
        run: |
          docker build -t maxpw777/backend -f server/Dockerfile .
          docker push maxpw777/backend

  deploy:
    if: github.event_name == 'push'
    needs: build_test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    concurrency:
      group: github-pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish package on NPM
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          pnpm run build-npm
          npm version "$RELEASE_TYPE" -m "chore: release %s [skip ci]"
          npm publish
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
