services:
  db:
    image: mysql:9.7
    environment:
      MYSQL_ROOT_PASSWORD: passwd
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8081:8080
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'php -r ''exit(@file_get_contents("http://127.0.0.1:8080/") === false ? 1 : 0);''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - 8000:8000
    environment:
      MYSQL_DATABASE: ynov-cicd
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: passwd
      MYSQL_HOST: db
    volumes:
      - ./server:/server
    command: uvicorn main:app --proxy-headers --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c ''import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/docs", timeout=2)''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  react:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:80
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./node_modules:/app/node_modules
    depends_on:
      server:
        condition: service_healthy

volumes:
  db_data:
